<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Safe Watch</title>

    <!-- Boostrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
    .top-custom {
        color: white;
    }
    .bg-custom {
        background-color: #062b5b;
    }
    .bg-custom-card {
        background-color: #ffffff;
    }
    .btn-custom {
        background-color: #c53030;
        border-color: #c53030;
        color: white;
    }
    </style>
</head>

<body class="bg-custom d-flex align-items-center" style="height: 100vh;">

    <div class="container">
        <div class="row justify-content-center">

            <div class="col-md-5 col-lg-4">

                <div class="top top-custom text-center">
                 <h1>Safe Watch</h1>
                </div>

                <div class="card shadow border-0">

                    <div class="card-header bg-secundary text-center">
                     <h4 class="mb-0">Login</h4>
                    </div>

                    <div class="card-body p-4 bg-custom-card">

                        <form>

                            <!-- Email -->
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control form-control-lg" placeholder="Insira seu email..." name="email" />
                            </div>

                            <!-- Senha -->
                            <div class="mb-3">
                                <label class="form-label">Senha</label>
                                <input type="senha" class="form-control form-control-lg" placeholder="Insira sua senha..." name="senha" />
                            </div>
                            
                            <!-- Lembrar -->
                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input">
                                <label class="form-check-label">Lembrar de mim</label>
                            </div>

                            <!-- Botão -->
                            <div class="d-grid mb-3">
                                <button type="submit" class="btn btn-custom btn-lg">Entrar</button>
                            </div>

                            <!-- Links -->
                            <div class="text-center">
                                <a href="#" class="text-secondary small text-decoration-none">Esqueceu a senha?</a>
                            </div>
                            
                            <div class="d-grid mb-3 text-center">
                                <hr>
                                <p>Não possui conta?</p>
                                <button tyle="submit" class="btn btn-custom btn-lg">Cadastrar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
